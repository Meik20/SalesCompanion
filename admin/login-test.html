<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Login Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #145f2f, #1B7A3E);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container { background: white; padding: 40px; border-radius: 16px; width: 100%; max-width: 380px; }
    h1 { margin-bottom: 20px; font-size: 18px; }
    .FormGroup { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    input:focus { outline: none; border-color: #1B7A3E; }
    .error { color: #e74c3c; font-size: 12px; margin-top: 8px; display: none; }
    button { 
      width: 100%; padding: 10px; background: #1B7A3E; color: white; border: none; border-radius: 6px; 
      font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px;
    }
    button:hover { background: #2ea05a; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .debug { background: #f5f5f5; padding: 12px; border-radius: 6px; margin-top: 16px; font-size: 11px; font-family: monospace; max-height: 200px; overflow-y: auto; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Admin Test Login</h1>
    
    <div class="FormGroup">
      <label>Identifiant</label>
      <input type="text" id="username" value="admin">
    </div>
    
    <div class="FormGroup">
      <label>Mot de passe</label>
      <input type="password" id="password" value="admin123" onkeydown="if(event.key==='Enter')handleLogin()">
    </div>
    
    <div class="error" id="error"></div>
    
    <button type="button" id="loginBtn" onclick="handleLogin()">
      Accéder au panel →
    </button>
    
    <div class="debug" id="debug">
      <strong>Debug Console:</strong><br>
      <div id="logs"></div>
    </div>
  </div>

  <script>
    // Simple logger
    const logs = [];
    function log(msg) {
      console.log(msg);
      logs.unshift('[' + new Date().toLocaleTimeString() + '] ' + msg);
      document.getElementById('logs').innerHTML = logs.slice(0, 20).map(l => l + '<br>').join('');
    }

    log('✅ Page loaded - Script initialized');

    window.handleLogin = function() {
      log('🔵 handleLogin() called');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const error = document.getElementById('error');

      log('Username: ' + username);
      log('Password length: ' + password.length);

      if (!username || !password) {
        error.textContent = '❌ Saisissez identifiant et mot de passe';
        error.style.display = 'block';
        log('❌ Missing credentials');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Connexion...';
      error.style.display = 'none';

      // Determine API endpoint
      const API = (window.location.origin && window.location.origin !== 'null') 
        ? window.location.origin 
        : 'http://localhost:3311';
      
      log('📡 API: ' + API);

      fetch(`${API}/admin/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
      .then(response => {
        log('📡 Response status: ' + response.status);
        if (!response.ok) {
          return response.json().then(data => {
            throw new Error(data.error || 'Error ' + response.status);
          });
        }
        return response.json();
      })
      .then(data => {
        log('✅ Login successful!');
        log('Token: ' + (data.token ? data.token.substring(0, 30) + '...' : 'null'));
        error.textContent = '✅ Connexion réussie!';
        error.style.display = 'block';
        error.style.color = '#1B7A3E';
        if (data.needs_password_change) {
          log('⚠️ Password change required');
          error.textContent = '⚠️ Vous devez changer votre mot de passe au premier login';
        }
      })
      .catch(err => {
        log('❌ Login failed: ' + err.message);
        error.textContent = '❌ ' + err.message;
        error.style.display = 'block';
        error.style.color = '#e74c3c';
      })
      .finally(() => {
        btn.disabled = false;
        btn.textContent = 'Accéder au panel →';
      });
    };

    // Check if button click works
    document.getElementById('loginBtn').addEventListener('click', function(e) {
      log('🖱️ Button click event fired');
    });

    log('✅ Event listeners attached');
  </script>
</body>
</html>
