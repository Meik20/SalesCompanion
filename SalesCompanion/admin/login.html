<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Admin — Sales Companion</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #1B7A3E;
      --primary-dark: #145f2f;
      --primary-light: #2ea05a;
      --bg: #f5f7fa;
      --card: #ffffff;
      --text: #1a1a1a;
      --text-light: #666;
      --border: #e0e0e0;
      --error: #d32f2f;
      --success: #388e3c;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-container {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 440px;
      padding: 48px 32px;
    }

    /* Header */
    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(27, 122, 62, 0.3);
    }

    .login-header h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .login-header p {
      font-size: 14px;
      color: var(--text-light);
      font-weight: 500;
    }

    /* Form */
    .login-form {
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: all 0.2s ease;
      background: #fafbfc;
    }

    .form-group input:focus {
      border-color: var(--primary);
      background: var(--card);
      box-shadow: 0 0 0 3px rgba(27, 122, 62, 0.08);
    }

    .form-group input::placeholder {
      color: #999;
    }

    .form-group input:disabled {
      background: #f0f0f0;
      cursor: not-allowed;
      opacity: 0.6;
    }

    /* Messages */
    .message {
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      display: none;
      animation: slideIn 0.3s ease;
    }

    .message.show {
      display: block;
    }

    .message.error {
      background: #ffebee;
      color: var(--error);
      border: 1px solid rgba(211, 47, 47, 0.2);
    }

    .message.success {
      background: #f1f8e9;
      color: var(--success);
      border: 1px solid rgba(56, 142, 60, 0.2);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Buttons */
    .login-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 48px;
    }

    .login-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(27, 122, 62, 0.35);
    }

    .login-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Footer */
    .login-footer {
      text-align: center;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-light);
    }

    .login-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .login-footer a:hover {
      color: var(--primary-light);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-container {
        padding: 32px 24px;
      }

      .login-header {
        margin-bottom: 28px;
      }

      .login-header h1 {
        font-size: 22px;
      }

      .form-group {
        margin-bottom: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <!-- Header -->
    <div class="login-header">
      <div class="login-icon">🏢</div>
      <h1>SALES COMPANION</h1>
      <p>Panel Administrateur</p>
    </div>

    <!-- Messages -->
    <div class="message" id="error-msg"></div>
    <div class="message success" id="success-msg"></div>

    <!-- Form -->
    <form class="login-form" id="login-form" onsubmit="handleLogin(event)">
      <!-- Server URL -->
      <div class="form-group">
        <label for="server-url">Serveur (URL)</label>
        <input
          type="url"
          id="server-url"
          placeholder="https://salescompanion-production-a34d.up.railway.app"
          required
          autocomplete="off"
        >
      </div>

      <!-- Username -->
      <div class="form-group">
        <label for="username">Identifiant</label>
        <input
          type="text"
          id="username"
          placeholder="admin"
          required
          autocomplete="off"
        >
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        >
      </div>

      <!-- Submit Button -->
      <button type="submit" class="login-btn" id="submit-btn">
        <span id="btn-text">Se connecter</span>
      </button>
    </form>

    <!-- Footer -->
    <div class="login-footer">
      Besoin d'aide? <a href="#" onclick="showHelp(event)">Documentation</a>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <!-- Script -->
  <script>
    // ============================================
    // FIREBASE CONFIGURATION
    // ============================================
    const firebaseConfig = {
      apiKey: "AIzaSyCVJxyeysHWDQ7yECTb-GApJz7u8s5l7N0",
      authDomain: "sales-companion-9cf56.firebaseapp.com",
      projectId: "sales-companion-9cf56",
      storageBucket: "sales-companion-9cf56.firebasestorage.app",
      messagingSenderId: "1058275289756",
      appId: "1:1058275289756:web:534cd79d5eb373348f5b59"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ============================================
    // CONFIGURATION
    // ============================================
    const STORAGE_KEY_HOST = 'sc_admin_host';
    const STORAGE_KEY_TOKEN = 'sc_admin_token';
    const STORAGE_KEY_SESSION_ID = 'sc_admin_session_id';
    const STORAGE_KEY_USERNAME = 'sc_admin_username';
    const DEFAULT_HOST = 'https://salescompanion-production-a34d.up.railway.app';

    // ============================================
    // DOM ELEMENTS
    // ============================================
    const form = document.getElementById('login-form');
    const serverUrlInput = document.getElementById('server-url');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');

    // ============================================
    // INITIALIZATION
    // ============================================
    document.addEventListener('DOMContentLoaded', async () => {
      console.log('[Admin Login] Initializing with Firestore...');
      
      // Set default server URL
      const savedHost = localStorage.getItem(STORAGE_KEY_HOST);
      serverUrlInput.value = savedHost || DEFAULT_HOST;
      
      // Check if already logged in via Firestore
      const sessionId = localStorage.getItem(STORAGE_KEY_SESSION_ID);
      if (sessionId) {
        console.log('[Admin Login] Session found in storage, validating via Firestore...');
        await validateAndRedirectFromFirestore(sessionId);
      }
      
      // Focus username field
      usernameInput.focus();
    });

    // ============================================
    // FORM SUBMISSION
    // ============================================
    async function handleLogin(event) {
      event.preventDefault();
      
      const serverUrl = serverUrlInput.value.trim();
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      
      // Clear messages
      hideMessage(errorMsg);
      hideMessage(successMsg);
      
      // Validate inputs
      if (!serverUrl || !username || !password) {
        showMessage(errorMsg, '❌ Veuillez remplir tous les champs');
        return;
      }
      
      // Validate URL format
      try {
        new URL(serverUrl);
      } catch (e) {
        showMessage(errorMsg, '❌ URL du serveur invalide');
        return;
      }
      
      // Disable button
      submitBtn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span> Connexion...';
      
      try {
        console.log('[Admin Login] Attempting login to:', serverUrl);
        
        const response = await fetch(`${serverUrl}/admin/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || 'Erreur d\'authentification');
        }
        
        if (!data.token) {
          throw new Error('Pas de token reçu');
        }
        
        console.log('[Admin Login] ✅ Authentication successful');
        
        // Save host in localStorage (cache local)
        localStorage.setItem(STORAGE_KEY_HOST, serverUrl);
        
        // Store session in Firestore (source of truth)
        const sessionId = generateSessionId();
        const sessionData = {
          username,
          token: data.token,
          host: serverUrl,
          createdAt: new Date(),
          lastSeen: new Date(),
          expiresAt: new Date(Date.now() + 8 * 60 * 60 * 1000), // 8 hours
          isActive: true
        };
        
        try {
          await db.collection('admin_sessions').doc(sessionId).set(sessionData);
          console.log('[Admin Login] ✅ Session stored in Firestore');
          
          // Save session ID in localStorage
          localStorage.setItem(STORAGE_KEY_SESSION_ID, sessionId);
          localStorage.setItem(STORAGE_KEY_TOKEN, data.token);
        } catch (firestoreError) {
          console.warn('[Admin Login] ⚠️ Firestore save failed, using localStorage fallback:', firestoreError);
          // Fallback: keep using localStorage if Firestore fails
          localStorage.setItem(STORAGE_KEY_TOKEN, data.token);
        }
        
        // Show success
        showMessage(successMsg, '✅ Connexion réussie ! Redirection...');
        
        // Redirect after 1 second
        setTimeout(() => {
          window.location.href = './';
        }, 1000);
        
      } catch (error) {
        console.error('[Admin Login] Error:', error.message);
        showMessage(errorMsg, '❌ ' + error.message);
      } finally {
        submitBtn.disabled = false;
        btnText.textContent = 'Se connecter';
      }
    }

    // ============================================
    // VALIDATION & REDIRECT (Firestore + Fallback)
    // ============================================

    // Generate unique session ID
    function generateSessionId() {
      return 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    }

    // Validate session from Firestore
    async function validateAndRedirectFromFirestore(sessionId) {
      try {
        const sessionDoc = await db.collection('admin_sessions').doc(sessionId).get();
        
        if (!sessionDoc.exists) {
          console.log('[Admin Login] Session document not found in Firestore');
          localStorage.removeItem(STORAGE_KEY_SESSION_ID);
          localStorage.removeItem(STORAGE_KEY_TOKEN);
          localStorage.removeItem(STORAGE_KEY_HOST);
          return;
        }

        const sessionData = sessionDoc.data();
        
        // Check expiration
        const expiresAt = sessionData.expiresAt?.toDate?.() || new Date(sessionData.expiresAt);
        if (new Date() > expiresAt) {
          console.log('[Admin Login] Session expired in Firestore');
          await db.collection('admin_sessions').doc(sessionId).update({
            isActive: false,
            expiredAt: new Date()
          });
          localStorage.removeItem(STORAGE_KEY_SESSION_ID);
          localStorage.removeItem(STORAGE_KEY_TOKEN);
          localStorage.removeItem(STORAGE_KEY_HOST);
          return;
        }

        // Check if active
        if (!sessionData.isActive) {
          console.log('[Admin Login] Session marked as inactive in Firestore');
          localStorage.removeItem(STORAGE_KEY_SESSION_ID);
          localStorage.removeItem(STORAGE_KEY_TOKEN);
          localStorage.removeItem(STORAGE_KEY_HOST);
          return;
        }

        // Session valid - restore state and redirect
        console.log('[Admin Login] Valid session found in Firestore, redirecting to admin panel');
        localStorage.setItem(STORAGE_KEY_TOKEN, sessionData.token);
        localStorage.setItem(STORAGE_KEY_HOST, sessionData.host);
        localStorage.setItem(STORAGE_KEY_USERNAME, sessionData.username);
        
        // Update last seen in Firestore
        await db.collection('admin_sessions').doc(sessionId).update({
          lastSeen: new Date()
        });
        
        // Redirect to admin panel
        window.location.href = './index.html';
      } catch (error) {
        console.error('[Admin Login] Error validating session from Firestore:', error);
        localStorage.removeItem(STORAGE_KEY_SESSION_ID);
        localStorage.removeItem(STORAGE_KEY_TOKEN);
        // Fallback continues silently
      }
    }

    // Validate token (legacy fallback)
    async function validateAndRedirect(token) {
      const serverUrl = localStorage.getItem(STORAGE_KEY_HOST) || DEFAULT_HOST;
      
      try {
        const response = await fetch(`${serverUrl}/auth/me`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        
        if (response.ok) {
          console.log('[Admin Login] Token valid, redirecting...');
          window.location.href = './index.html';
        } else {
          console.log('[Admin Login] Token invalid');
          localStorage.removeItem(STORAGE_KEY_TOKEN);
        }
      } catch (error) {
        console.error('[Admin Login] Validation error:', error);
        localStorage.removeItem(STORAGE_KEY_TOKEN);
      }
    }

    // ============================================
    // UTILITIES
    // ============================================
    function showMessage(element, text) {
      element.textContent = text;
      element.classList.add('show');
    }

    function hideMessage(element) {
      element.classList.remove('show');
      element.textContent = '';
    }

    function showHelp(event) {
      event.preventDefault();
      alert('Contactez votre administrateur système pour plus d\'informations.');
    }
  </script>
</body>
</html>
