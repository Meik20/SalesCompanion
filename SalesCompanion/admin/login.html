<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Connexion — Sales Companion</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1B7A3E;
      --primary-dark: #145f2f;
      --primary-light: #2ea05a;
      --error: #e74c3c;
      --success: #27ae60;
      --bg-light: #f0f2f5;
      --bg-white: #ffffff;
      --border: rgba(0, 0, 0, 0.1);
      --text: #111;
      --text-light: #666;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: var(--text);
    }

    .login-container {
      background: var(--bg-white);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 420px;
      padding: 40px 32px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 16px;
      box-shadow: 0 4px 12px rgba(27, 122, 62, 0.3);
    }

    .login-header h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }

    .login-header p {
      font-size: 13px;
      color: var(--text-light);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 11px 13px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s ease;
      background: var(--bg-white);
      color: var(--text);
    }

    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(27, 122, 62, 0.1);
    }

    .form-group input:disabled {
      background: var(--bg-light);
      cursor: not-allowed;
      opacity: 0.6;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .login-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(27, 122, 62, 0.3);
    }

    .login-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .login-btn span {
      display: inline-block;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message {
      background: #fef5f5;
      border: 1px solid #f0d9d6;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--error);
      display: none;
      animation: slideDown 0.3s ease;
    }

    .error-message.show {
      display: block;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .success-message {
      background: #f0fdf4;
      border: 1px solid #dbeafe;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--success);
      display: none;
      animation: slideDown 0.3s ease;
    }

    .success-message.show {
      display: block;
    }

    .login-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: var(--text-light);
    }

    .login-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    .demo-hint {
      background: #f0f2f5;
      border-radius: 8px;
      padding: 12px;
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-light);
      line-height: 1.5;
    }

    .demo-hint strong {
      color: var(--text);
    }

    @media (max-width: 480px) {
      .login-container {
        margin: 16px;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-icon">🏢</div>
      <h1>SALES COMPANION</h1>
      <p>Panel Administrateur</p>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="error-message" id="error-msg"></div>
      <div class="success-message" id="success-msg"></div>

      <div class="form-group">
        <label for="username">Identifiant</label>
        <input 
          type="text" 
          id="username" 
          name="username"
          value="admin"
          placeholder="admin"
          required
          autocomplete="username"
        >
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input 
          type="password" 
          id="password" 
          name="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        >
      </div>

      <button type="submit" class="login-btn" id="login-btn">
        <span id="btn-text">Connexion</span>
      </button>
    </form>

    <div class="demo-hint">
      <strong>Démo :</strong> Utilisez <strong>admin</strong> / <strong>admin123</strong>
    </div>

    <div class="login-footer">
      Premier accès ? <a href="#" onclick="showSetupGuide(event)">Configuration</a>
    </div>
  </div>

  <script>
    // ============================================
    // INITIALIZATION
    // ============================================
    const API_URL = (function() {
      if (typeof window !== 'undefined' && window.location && window.location.origin && window.location.origin !== 'null') {
        return window.location.origin;
      }
      return 'http://localhost:3000';
    })();
    
    console.log('🔧 Login page initialized. API_URL:', API_URL);

    // ============================================
    // FORM EVENT HANDLERS
    // ============================================
    
    /**
     * Main login handler - called on form submit
     */
    async function handleLogin(event) {
      console.log('▶️ handleLogin called');
      
      // Prevent default form submission
      if (event) {
        event.preventDefault();
      }
      
      // Get form elements
      const username = document.getElementById('username');
      const password = document.getElementById('password');
      const btn = document.getElementById('login-btn');
      const btnText = document.getElementById('btn-text');
      const errorMsg = document.getElementById('error-msg');
      const successMsg = document.getElementById('success-msg');
      
      // Validate elements exist
      if (!username || !password || !btn) {
        console.error('❌ Required form elements not found');
        return false;
      }
      
      const usernameValue = (username.value || '').trim();
      const passwordValue = password.value || '';
      
      console.log('📝 Form values - Username:', usernameValue.length > 0 ? '•••' : 'empty', 'Password:', passwordValue.length > 0 ? '•••' : 'empty');

      // Validation
      if (!usernameValue || !passwordValue) {
        console.warn('⚠️ Missing credentials');
        showError(errorMsg, 'Veuillez remplir tous les champs');
        return false;
      }

      // Disable button and show loading state
      console.log('🔒 Disabling button');
      btn.disabled = true;
      if (btnText) {
        btnText.innerHTML = '<span class="spinner"></span> Connexion...';
      }
      
      if (errorMsg) errorMsg.classList.remove('show');
      if (successMsg) successMsg.classList.remove('show');

      try {
        const endpoint = `${API_URL}/admin/login`;
        console.log('📤 POST request to:', endpoint);
        
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify({
            username: usernameValue,
            password: passwordValue
          }),
          credentials: 'omit'
        });

        console.log('📥 Response received - Status:', response.status, 'Type:', response.type);

        // Handle non-JSON responses
        let data;
        const contentType = response.headers.get('content-type');
        if (contentType && contentType.includes('application/json')) {
          data = await response.json();
          console.log('📋 Response JSON received');
        } else {
          throw new Error(`Invalid response type: ${contentType || 'unknown'}`);
        }

        if (!response.ok) {
          console.error('❌ API error:', data.error);
          throw new Error(data.error || `Server error ${response.status}`);
        }

        // Success - store token
        console.log('✅ Login successful');
        if (data.token) {
          localStorage.setItem('admin_token', data.token);
          console.log('💾 Token saved');
        }
        
        showSuccess(successMsg, 'Connexion réussie ! Redirection...');
        
        // Redirect after 1.5 seconds
        setTimeout(() => {
          console.log('↪️ Redirecting to admin panel');
          window.location.href = './';
        }, 1500);
        
        return true;

      } catch (error) {
        console.error('❌ Login failed:', error);
        
        let message = 'Erreur de connexion';
        
        // Map common errors to user-friendly messages
        if (error.message.includes('Failed to fetch')) {
          message = 'Serveur indisponible. Vérifiez votre connexion et que le serveur fonctionne.';
        } else if (error.message.includes('Invalid credentials')) {
          message = 'Identifiant ou mot de passe incorrect';
        } else if (error.message.includes('not found')) {
          message = 'Administrateur non trouvé';
        } else if (error.message.includes('not ready')) {
          message = 'Base de données non initialisée. Attendez quelques instants.';
        } else if (error.message.includes('Invalid response')) {
          message = 'Réponse serveur invalide';
        } else {
          message = error.message || 'Erreur de connexion inconnue';
        }
        
        showError(errorMsg, message);
        return false;
        
      } finally {
        console.log('↩️ Cleanup - Re-enabling button');
        btn.disabled = false;
        if (btnText) {
          btnText.textContent = 'Connexion';
        }
      }
    }

    /**
     * Show error message with auto-hide
     */
    function showError(element, message) {
      if (!element) return;
      console.log('⚠️ Error:', message);
      element.textContent = '❌ ' + message;
      element.classList.add('show');
      
      setTimeout(() => {
        element.classList.remove('show');
      }, 6000);
    }

    /**
     * Show success message
     */
    function showSuccess(element, message) {
      if (!element) return;
      console.log('✨ Success:', message);
      element.textContent = '✅ ' + message;
      element.classList.add('show');
    }

    /**
     * Show setup guide
     */
    function showSetupGuide(event) {
      event.preventDefault();
      alert('Configuration rapide:\n\n1. Assurez-vous que le serveur démarre (port 3000)\n2. Firestore doit être initialisé\n3. L\'admin par défaut (admin/admin123) doit exister\n\nVoir RAILWAY-DEPLOYMENT.md pour plus d\'infos');
    }

    // ============================================
    // EVENT LISTENERS
    // ============================================
    
    // Ensure form submission works even if onsubmit is not called
    document.addEventListener('DOMContentLoaded', function() {
      console.log('📄 DOM content loaded');
      
      const form = document.getElementById('login-form');
      const btn = document.getElementById('login-btn');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      
      if (!form) {
        console.error('❌ Form element not found!');
        return;
      }
      
      console.log('✅ Form found, attaching listeners');
      
      // Primary: Form submit handler
      form.addEventListener('submit', handleLogin);
      console.log('  → Form submit listener attached');
      
      // Secondary: Button click handler (backup)
      if (btn) {
        btn.addEventListener('click', function(e) {
          console.log('🖱️ Button clicked');
          // Manually trigger form submission
          form.dispatchEvent(new Event('submit', { bubbles: true, cancelable: true }));
        });
        console.log('  → Button click listener attached');
      }
      
      // Auto-focus password when username is filled
      if (usernameInput) {
        usernameInput.addEventListener('change', function() {
          if (this.value && passwordInput) {
            console.log('👁️ Auto-focusing password field');
            passwordInput.focus();
          }
        });
        console.log('  → Username change listener attached');
      }
      
      // Enter key support in password field
      if (passwordInput) {
        passwordInput.addEventListener('keypress', function(e) {
          if (e.key === 'Enter' || e.code === 'Enter') {
            console.log('⌨️ Enter key pressed in password field');
            form.dispatchEvent(new Event('submit', { bubbles: true, cancelable: true }));
          }
        });
        console.log('  → Password keypress listener attached');
      }
    });

    // Test API connectivity on page load
    window.addEventListener('load', async () => {
      console.log('🔗 Testing API connectivity...');
      try {
        const response = await fetch(`${API_URL}/health`, {
          method: 'GET',
          credentials: 'omit'
        });
        const data = await response.json();
        console.log('✅ API status OK:', data.status, '| DB Ready:', data.db);
      } catch (e) {
        console.warn('⚠️ API connectivity test failed:', e.message);
      }
    });
    
    console.log('📦 Login script fully loaded');
  </script>
</body>
</html>
