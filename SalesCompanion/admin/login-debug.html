<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login Debug Test</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .test { padding: 10px; margin: 10px 0; border: 1px solid #ddd; }
    .pass { background: #d4edda; }
    .fail { background: #f8d7da; }
  </style>
</head>
<body>
  <h1>Login Form Debug</h1>
  <div id="results"></div>

  <script>
    const results = document.getElementById('results');
    
    function test(name, condition) {
      const div = document.createElement('div');
      div.className = 'test ' + (condition ? 'pass' : 'fail');
      div.textContent = (condition ? '✅' : '❌') + ' ' + name;
      results.appendChild(div);
    }

    // Wait for DOM to be ready
    document.addEventListener('DOMContentLoaded', function() {
      test('Form element exists', !!document.getElementById('login-form'));
      test('Username input exists', !!document.getElementById('username'));
      test('Password input exists', !!document.getElementById('password'));
      test('Button exists', !!document.getElementById('login-btn'));
      test('Button text span exists', !!document.getElementById('btn-text'));
      test('handleLogin function defined', typeof handleLogin === 'function');
      
      const btn = document.getElementById('login-btn');
      if (btn) {
        test('Button type is submit', btn.type === 'submit');
        test('Button is not disabled', !btn.disabled);
        test('Button is visible', btn.offsetParent !== null);
      }
    });
  </script>

  <h2>Actual Login Form</h2>
  <iframe src="/admin/login.html" style="width:100%; height:600px; border:1px solid #ccc;"></iframe>
</body>
</html>
